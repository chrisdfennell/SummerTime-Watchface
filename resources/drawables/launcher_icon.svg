<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Pitch-black gothic backdrop -->
  <rect width="48" height="48" rx="8" fill="#050505"/>
  <circle cx="24" cy="24" r="21" stroke="#3A1010" stroke-width="1.5" opacity="0.8"/>

  <!-- Left globe: Body Battery (crimson) -->
  <defs>
    <radialGradient id="redGlobe" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#FF5A4A"/>
      <stop offset="55%" stop-color="#C01818"/>
      <stop offset="100%" stop-color="#3A0606"/>
    </radialGradient>
    <radialGradient id="blueGlobe" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#5ABEFF"/>
      <stop offset="55%" stop-color="#1A66D8"/>
      <stop offset="100%" stop-color="#06183A"/>
    </radialGradient>
  </defs>
  <circle cx="12" cy="30" r="8" fill="url(#redGlobe)" stroke="#FF6A5A" stroke-width="0.8"/>
  <circle cx="10" cy="27" r="1.6" fill="#FFFFFF" opacity="0.7"/>

  <!-- Right globe: device battery (sapphire) -->
  <circle cx="36" cy="30" r="8" fill="url(#blueGlobe)" stroke="#6AC2FF" stroke-width="0.8"/>
  <circle cx="34" cy="27" r="1.6" fill="#FFFFFF" opacity="0.7"/>

  <!-- Central time bar. Drawn with vector strokes (no <text>) so the SVG rasterizes
       in headless CI containers that have no system fonts. -->
  <rect x="18" y="13" width="12" height="9" rx="1.5" fill="#0E0E0E" stroke="#8A2020" stroke-width="0.8"/>
  <g stroke="#E8E8E8" stroke-width="1" stroke-linecap="round">
    <line x1="22" y1="16" x2="22" y2="19"/>
    <line x1="24" y1="16" x2="24" y2="19"/>
    <line x1="26" y1="16" x2="26" y2="19"/>
  </g>

  <!-- XP bar at the bottom -->
  <rect x="14" y="40" width="20" height="2.5" rx="1.25" fill="#1A1408"/>
  <rect x="14" y="40" width="13" height="2.5" rx="1.25" fill="#E0A030"/>
</svg>
